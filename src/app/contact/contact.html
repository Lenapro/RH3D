<app-header></app-header>
<section class="bg-[#f0ede8]/50 lg:grid lg:grid-cols-7 gap-8 items-start shadow py-8 md:px-16">
    <div class="lg:grid lg:grid-cols-3 gap-10 items-start lg:col-span-5">
        <div class="space-y-4 xl:space-y-8 p-8 lg:px-16 xl:px-30 xl:py-16 lg:col-span-2">
            <p class="text-2xl lg:text-3xl text-gray-800 font-bold">Nous contacter</p>
            <span class="block h-1 bg-gray-600 rounded-full w-1/6"></span>
            <p class="lg:text-2xl text-xl text-gray-700 font-semibold">Parlons de nos actions</p>
            <p class="text-gray-600">Une question, une idée, un partenariat ? <br>
                <span>L'équipe RH3D est à votre écoute.</span>
            </p>
            <form action="" class="space-y-4">
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <input type="text" placeholder="Votre nom *" class="border border-gray-500 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <input type="email" placeholder="Votre e-mail *" class="border border-gray-500 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <textarea placeholder="Votre message" rows="5" class="w-full border border-gray-500 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                <button type="submit" class="bg-green-800 w-full text-gray-100 px-6 py-2 rounded-md hover:bg-green-700 transition">
                    <fa-icon [icon]="faPaperPlane" class="pr-2"></fa-icon>
                    <span class="font-semibold w-full">Envoyer le message</span>
                </button>
            </form>
        </div>
        <div class="grid grid-cols-1 gap-4 p-8 xl:py-16">
            <div class="bg-gray-50 p-6 rounded-lg shadow-md flex gap-2">
                <fa-icon [icon]="faLocation" class="text-green-900 text-4xl"></fa-icon>
                <div>
                    <p class="text-green-900 font-semibold pb-2">Adresse</p>
                    <span class="block h-1 bg-green-800 rounded-full w-1/6"></span>
                    <p class="py-2">
                        République du Congo
                    </p>
                </div>
            </div>
            <div class="bg-gray-50 p-6 rounded-lg shadow-md flex gap-2">
                <fa-icon [icon]="faEnvelope" class="text-green-900 text-4xl"></fa-icon>
                <div>
                    <p class="text-green-900 font-semibold pb-2">Email</p>
                    <span class="block h-1 bg-green-800 rounded-full w-1/4"></span>
                    <p class="py-2">
                        contact@gmail.com
                    </p>
                </div>
            </div>
            <div class="bg-gray-50 p-6 rounded-lg shadow-md flex gap-2">
                <fa-icon [icon]="faPhone" class="text-green-900 text-4xl"></fa-icon>
                <div>
                    <p class="text-green-900 font-semibold pb-2">Téléphone</p>
                    <span class="block h-1 bg-green-800 rounded-full w-1/4"></span>
                    <p class="py-2">
                        +242 06 000 00 00
                    </p>
                </div>
            </div>
        </div>
    </div>
    <div class="lg:col-span-2 px-8 lg:px-16 xl:px-30 py-8">
        <div class="bg-gray-50 rounded-lg shadow p-6 space-y-4">
            <img src="images/Volunteering-bro.png" alt="">
            <p class="text-green-800 font-bold text-base text-center">Envie de collaborer avec nous ?</p>
            <p class="text-sm text-center">Devenez partenaire et agissons ensemble pour un impact durable.</p>
            <div class="flex justify-center">
                <a href="/partenaire">
                    <fa-icon [icon]="faCircleArrowDown" class="text-green-800 text-4xl"></fa-icon>
                </a>
            </div>
        </div>
    </div>
</section>
<app-footer></app-footer>
